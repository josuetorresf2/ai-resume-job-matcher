name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fairhire_test
          POSTGRES_USER: fairhire
          POSTGRES_PASSWORD: fairhire
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fairhire -d fairhire_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test_role_matcher.db
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check app tests
      - run: pytest
      - name: Verify Alembic migration against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://fairhire:fairhire@localhost:5432/fairhire_test
        run: alembic -c alembic.ini upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
