services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/resume_matcher.db
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
