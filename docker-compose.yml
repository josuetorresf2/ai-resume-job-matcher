services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fairhire
      POSTGRES_USER: fairhire
      POSTGRES_PASSWORD: fairhire
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairhire -d fairhire"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://fairhire:fairhire@db:5432/fairhire
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: fairhire-job-imports
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-db
    ports:
      - "7233:7233"
    depends_on:
      temporal-db:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.30.1
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      - temporal

  worker:
    build:
      context: ./backend
    command: python -m app.temporal_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://fairhire:fairhire@db:5432/fairhire
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: fairhire-job-imports
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  temporal-postgres-data:
