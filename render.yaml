services:
  - type: web
    name: fairhire-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fairhire-postgres
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SMS_FROM
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

databases:
  - name: fairhire-postgres
    plan: free
    databaseName: fairhire
    user: fairhire
